<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Cuentas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .status {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: left;
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        .status-item:last-child {
            border-bottom: none;
        }
        .status-label {
            color: #333;
            font-weight: 500;
        }
        .status-value {
            color: #667eea;
            font-weight: bold;
        }
        .ok { color: #10b981; }
        .error { color: #ef4444; }
        .loading { color: #f59e0b; }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        button:hover {
            background: #5568d3;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Gestor de Cuentas</h1>
        <p class="subtitle">Sistema de gestión de clientes y servicios</p>
        
        <div class="status">
            <div class="status-item">
                <span class="status-label">Conexión Supabase:</span>
                <span class="status-value loading" id="conexion">Verificando...</span>
            </div>
            <div class="status-item">
                <span class="status-label">Total clientes:</span>
                <span class="status-value" id="total-clientes">-</span>
            </div>
            <div class="status-item">
                <span class="status-label">Total servicios:</span>
                <span class="status-value" id="total-servicios">-</span>
            </div>
        </div>

        <button onclick="probarConexion()">🔄 Probar conexión</button>

        <p class="footer">v0.1 - Setup inicial</p>
    </div>

    <!-- Librería de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // ===== CONFIGURACIÓN DE SUPABASE =====
        const SUPABASE_URL = 'https://cnhiomoopbuufiffrpod.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGlvbW9vcGJ1dWZpZmZycG9kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MTM5MzEsImV4cCI6MjA5NTQ4OTkzMX0.-Mvkwz296Td4DwLlZ9_4rWb74cn1f9Mh7IVP8YkaaOo';
        
        // Crear cliente de Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ===== FUNCIÓN PARA PROBAR CONEXIÓN =====
        async function probarConexion() {
            const conexionEl = document.getElementById('conexion');
            const clientesEl = document.getElementById('total-clientes');
            const serviciosEl = document.getElementById('total-servicios');
            
            conexionEl.textContent = 'Verificando...';
            conexionEl.className = 'status-value loading';

            try {
                // Contar clientes
                const { count: clientes, error: errCli } = await supabase
                    .from('clientes')
                    .select('*', { count: 'exact', head: true });
                
                if (errCli) throw errCli;

                // Contar servicios
                const { count: servicios, error: errServ } = await supabase
                    .from('servicios')
                    .select('*', { count: 'exact', head: true });
                
                if (errServ) throw errServ;

                // Si todo bien
                conexionEl.textContent = '✅ Conectado';
                conexionEl.className = 'status-value ok';
                clientesEl.textContent = clientes ?? 0;
                serviciosEl.textContent = servicios ?? 0;
                
            } catch (error) {
                conexionEl.textContent = '❌ Error';
                conexionEl.className = 'status-value error';
                clientesEl.textContent = '-';
                serviciosEl.textContent = '-';
                console.error('Error:', error);
                alert('Error al conectar: ' + error.message);
            }
        }

        // Probar conexión al cargar la página
        window.addEventListener('load', probarConexion);
    </script>
</body>
</html>
