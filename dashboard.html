<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Gestor de Cuentas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: #f3f4f6; min-height: 100vh; }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .navbar h1 { font-size: 20px; }
        .navbar .user { font-size: 14px; opacity: 0.9; }
        .navbar button {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .navbar button:hover { background: rgba(255,255,255,0.3); }
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .card-label {
            color: #666;
            font-size: 13px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .card-value {
            color: #333;
            font-size: 32px;
            font-weight: bold;
        }
        .menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }
        .menu-item {
            background: white;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            text-decoration: none;
            color: #333;
        }
        .menu-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(102,126,234,0.2);
            border-color: #667eea;
        }
        .menu-item .icon {
            font-size: 36px;
            margin-bottom: 10px;
        }
        .menu-item .title {
            font-size: 16px;
            font-weight: 600;
        }
        .menu-item .desc {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>🎯 Gestor de Cuentas</h1>
        <div style="display:flex; align-items:center; gap:16px;">
            <span class="user" id="user-email">...</span>
            <button onclick="cerrarSesion()">Cerrar sesión</button>
        </div>
    </div>

    <div class="container">
        <h2>📊 Resumen</h2>
        <div class="grid">
            <div class="card">
                <div class="card-label">Clientes activos</div>
                <div class="card-value" id="stat-clientes">-</div>
            </div>
            <div class="card">
                <div class="card-label">Servicios</div>
                <div class="card-value" id="stat-servicios">-</div>
            </div>
            <div class="card">
                <div class="card-label">Suscripciones activas</div>
                <div class="card-value" id="stat-suscripciones">-</div>
            </div>
            <div class="card">
                <div class="card-label">Pagos del mes</div>
                <div class="card-value" id="stat-pagos">-</div>
            </div>
        </div>

        <h2>🚀 Menú</h2>
        <div class="menu">
            <a href="clientes.html" class="menu-item">
                <div class="icon">👥</div>
                <div class="title">Clientes</div>
                <div class="desc">Gestionar tus clientes</div>
            </a>
            <a href="servicios.html" class="menu-item">
                <div class="icon">📦</div>
                <div class="title">Servicios</div>
                <div class="desc">Netflix, Disney, etc.</div>
            </a>
            <a href="suscripciones.html" class="menu-item">
                <div class="icon">🔗</div>
                <div class="title">Suscripciones</div>
                <div class="desc">Cliente ↔ Servicio</div>
            </a>
            <a href="pagos.html" class="menu-item">
                <div class="icon">💰</div>
                <div class="title">Pagos</div>
                <div class="desc">Registrar y consultar</div>
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://cnhiomoopbuufiffrpod.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGlvbW9vcGJ1dWZpZmZycG9kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MTM5MzEsImV4cCI6MjA5NTQ4OTkzMX0.-Mvkwz296Td4DwLlZ9_4rWb74cn1f9Mh7IVP8YkaaOo';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Verificar sesión
        window.addEventListener('load', async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
                return;
            }
            document.getElementById('user-email').textContent = session.user.email;
            cargarEstadisticas();
        });

        async function cargarEstadisticas() {
            try {
                const { count: clientes } = await supabase
                    .from('clientes')
                    .select('*', { count: 'exact', head: true })
                    .eq('estado', 'activo');

                const { count: servicios } = await supabase
                    .from('servicios')
                    .select('*', { count: 'exact', head: true });

                const { count: suscripciones } = await supabase
                    .from('suscripciones')
                    .select('*', { count: 'exact', head: true })
                    .eq('estado', 'activa');

                const inicioMes = new Date();
                inicioMes.setDate(1);
                const { count: pagos } = await supabase
                    .from('pagos')
                    .select('*', { count: 'exact', head: true })
                    .gte('fecha_real', inicioMes.toISOString().split('T')[0]);

                document.getElementById('stat-clientes').textContent = clientes ?? 0;
                document.getElementById('stat-servicios').textContent = servicios ?? 0;
                document.getElementById('stat-suscripciones').textContent = suscripciones ?? 0;
                document.getElementById('stat-pagos').textContent = pagos ?? 0;
            } catch (err) {
                console.error(err);
            }
        }

        async function cerrarSesion() {
            await supabase.auth.signOut();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
