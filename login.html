<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gestor de Cuentas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 420px;
            width: 100%;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 {
            color: #333;
            font-size: 26px;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 15px;
            transition: border 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            background: #667eea;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background: #5568d3;
        }
        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
        .mensaje {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .mensaje.error {
            background: #fee;
            color: #c00;
            border: 1px solid #fcc;
            display: block;
        }
        .mensaje.ok {
            background: #efe;
            color: #060;
            border: 1px solid #cfc;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🎯 Gestor de Cuentas</h1>
            <p class="subtitle">Inicia sesión para continuar</p>
        </div>

        <div id="mensaje" class="mensaje"></div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="tu@email.com" required>
        </div>

        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <button id="btn-login" onclick="iniciarSesion()">Iniciar sesión</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        const SUPABASE_URL = 'https://cnhiomoopbuufiffrpod.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGlvbW9vcGJ1dWZpZmZycG9kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MTM5MzEsImV4cCI6MjA5NTQ4OTkzMX0.-Mvkwz296Td4DwLlZ9_4rWb74cn1f9Mh7IVP8YkaaOo';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Si ya está logueado, ir directo al dashboard
        window.addEventListener('load', async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = 'dashboard.html';
            }
        });

        function mostrarMensaje(texto, tipo) {
            const el = document.getElementById('mensaje');
            el.textContent = texto;
            el.className = 'mensaje ' + tipo;
        }

        async function iniciarSesion() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const boton = document.getElementById('btn-login');

            if (!email || !password) {
                mostrarMensaje('Completa email y contraseña', 'error');
                return;
            }

            boton.disabled = true;
            boton.textContent = 'Verificando...';

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;

                mostrarMensaje('✅ Bienvenido, entrando...', 'ok');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 800);

            } catch (error) {
                mostrarMensaje('❌ ' + (error.message || 'Error al iniciar sesión'), 'error');
                boton.disabled = false;
                boton.textContent = 'Iniciar sesión';
            }
        }

        // Permitir login con Enter
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') iniciarSesion();
        });
        document.getElementById('email').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') iniciarSesion();
        });
    </script>
</body>
</html>
